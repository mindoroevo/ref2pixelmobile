<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ref2Pixel | Datenschutzerklaerung</title>
    <meta
      name="description"
      content="Weiterleitung zur Datenschutzerklaerung von Ref2Pixel fuer GitHub Pages."
    />
    <meta http-equiv="refresh" content="0; url=privacy-policy.html" />
    <link rel="canonical" href="privacy-policy.html" />
    <style>
      :root {
        color-scheme: dark;
        --bg: #07111f;
        --bg-2: #0d1728;
        --card: rgba(13, 22, 40, 0.88);
        --text: #f2f6ff;
        --muted: #c4d0e6;
        --line: rgba(150, 176, 224, 0.16);
        --accent: #9fd0ff;
        --shadow: 0 24px 80px rgba(0, 0, 0, 0.34);
      }

      * {
        box-sizing: border-box;
      }

      body {
        display: grid;
        place-items: center;
        min-height: 100vh;
        margin: 0;
        padding: 20px;
        font-family: "Segoe UI", "Helvetica Neue", Arial, sans-serif;
        background:
          radial-gradient(circle at top right, rgba(122, 162, 255, 0.18), transparent 30%),
          radial-gradient(circle at left 20%, rgba(67, 208, 255, 0.08), transparent 24%),
          linear-gradient(180deg, var(--bg-2) 0%, var(--bg) 100%);
        color: var(--text);
      }

      main {
        width: min(560px, 100%);
        padding: 28px;
        border: 1px solid var(--line);
        border-radius: 24px;
        background: var(--card);
        box-shadow: var(--shadow);
        text-align: center;
      }

      h1 {
        margin: 0 0 12px;
        font-size: clamp(1.8rem, 5vw, 2.4rem);
      }

      p {
        margin: 0;
        color: var(--muted);
        line-height: 1.7;
      }

      a {
        color: var(--accent);
        text-underline-offset: 3px;
      }
    </style>
    <script>
      window.location.replace("privacy-policy.html");
    </script>
  </head>
  <body>
    <main>
      <h1>Weiterleitung zur Datenschutzerklaerung</h1>
      <p>
        Falls die automatische Weiterleitung nicht funktioniert, oeffne bitte
        <a href="privacy-policy.html">privacy-policy.html</a>.
      </p>
    </main>
  </body>
</html>
